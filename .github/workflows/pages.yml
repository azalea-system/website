name: Deploy SvelteKit to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm first
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # 2. Setup Node and enable pnpm caching
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 3. Install packages using pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. Build SvelteKit static app
      - name: Build
        run: pnpm run build

      # 5. Upload static output directory directly
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
